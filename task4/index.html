<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>result</title>
  </head>
  <body>
    <h4>alkarimova</h4>

    <script>
      const n = Number(decodeURIComponent(location.search.slice(1)));

      const isPrime = num => {
        if (num < 2) return false;
        for (let i = 2; i * i <= num; i += 1) {
          if (num % i === 0) return false;
        }
        return true;
      };

      let count = 0;

      for (let i = 2; i <= n; i += 1) {
        if (isPrime(i)) count += 1;
      }

      document.title = String(count);
    </script>
  </body>
</html>
